<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>勇者と魔王の冒険RPG</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
        background: linear-gradient(180deg, #dbeafe, #eef2ff);
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #1f2937;
      }
      .game {
        width: min(92vw, 760px);
        background: #ffffff;
        border: 3px solid #1d4ed8;
        border-radius: 14px;
        box-shadow: 0 10px 25px rgba(30, 64, 175, 0.2);
        overflow: hidden;
      }
      .header {
        background: #1d4ed8;
        color: #fff;
        padding: 14px 16px;
      }
      .header h1 {
        margin: 0;
        font-size: 1.1rem;
      }
      .status {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        padding: 12px 16px;
        background: #eff6ff;
        border-bottom: 1px solid #bfdbfe;
      }
      .card {
        background: #fff;
        border: 1px solid #bfdbfe;
        border-radius: 10px;
        padding: 10px;
      }
      .name {
        font-weight: 700;
        margin-bottom: 6px;
      }
      .bar {
        width: 100%;
        height: 14px;
        background: #e5e7eb;
        border-radius: 999px;
        overflow: hidden;
      }
      .fill {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #22c55e, #16a34a);
        transition: width 0.2s ease;
      }
      .enemy .fill {
        background: linear-gradient(90deg, #ef4444, #dc2626);
      }
      .body {
        padding: 16px;
        display: grid;
        gap: 12px;
      }
      .scene {
        border: 1px solid #d1d5db;
        border-radius: 10px;
        background: #f9fafb;
        padding: 14px;
        min-height: 64px;
        line-height: 1.6;
      }
      .actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      button {
        border: none;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        padding: 12px 10px;
        font-size: 1rem;
        cursor: pointer;
      }
      button:hover:enabled {
        background: #1d4ed8;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .log {
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 10px;
        background: #fff;
        max-height: 200px;
        overflow: auto;
      }
      .log p {
        margin: 0 0 7px;
        font-size: 0.95rem;
      }
      .log p:last-child {
        margin-bottom: 0;
      }
      .footer {
        display: flex;
        justify-content: flex-end;
      }
      .secondary {
        background: #0f766e;
      }
      .secondary:hover:enabled {
        background: #0d5f59;
      }
      @media (max-width: 560px) {
        .status,
        .actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="game" aria-label="勇者と魔王のRPG">
      <header class="header">
        <h1>勇者と魔王の冒険RPG</h1>
      </header>

      <section class="status">
        <article class="card hero">
          <div class="name">🛡️ 勇者</div>
          <div>HP: <span id="hero-hp-text">100</span> / <span id="hero-max-hp">100</span></div>
          <div class="bar" aria-hidden="true"><div id="hero-hp-bar" class="fill"></div></div>
          <div>ポーション: <span id="potions">3</span>個</div>
        </article>
        <article class="card enemy">
          <div class="name">👹 魔王</div>
          <div>HP: <span id="boss-hp-text">120</span> / <span id="boss-max-hp">120</span></div>
          <div class="bar" aria-hidden="true"><div id="boss-hp-bar" class="fill"></div></div>
          <div>怒り: <span id="rage">0</span> / 5</div>
        </article>
      </section>

      <section class="body">
        <div id="scene" class="scene">暗雲立ちこめる魔王城。勇者はついに玉座の間へ到着した！</div>

        <div class="actions">
          <button id="attack-btn">⚔️ こうげき</button>
          <button id="skill-btn">✨ ひっさつ（3ターン毎）</button>
          <button id="heal-btn">🧪 ポーション</button>
          <button id="guard-btn">🛡️ ぼうぎょ</button>
        </div>

        <div id="log" class="log" aria-live="polite"></div>

        <div class="footer">
          <button id="restart-btn" class="secondary" disabled>🔁 もう一度冒険する</button>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
